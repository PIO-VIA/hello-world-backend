version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: newspaper_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=school_newspaper
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d school_newspaper"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: newspaper_api
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/school_newspaper

volumes:
  postgres_data:
