services:
  - type: web
    name: school-newspaper-api
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: frankfurt # Or your preferred region
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: school-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: POSTGRES_SERVER
        value: "" # Built from DATABASE_URL
      - key: POSTGRES_USER
        value: "" # Built from DATABASE_URL
      - key: POSTGRES_PASSWORD
        value: "" # Built from DATABASE_URL
      - key: POSTGRES_DB
        value: "" # Built from DATABASE_URL

databases:
  - name: school-db
    plan: free
